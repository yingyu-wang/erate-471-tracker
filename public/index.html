<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Rate Form 471 Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">471</div>
        <div>
          <h1>E-Rate Tracker</h1>
          <p>USAC Form 471 Status</p>
        </div>
      </div>
      <nav class="nav">
        <button class="nav-btn active" data-view="dashboard">Dashboard</button>
        <button class="nav-btn" data-view="applications">Applications</button>
        <button class="nav-btn" data-view="frns">All FRNs</button>
      </nav>
      <div class="sidebar-footer">
        <div id="db-status" class="db-status">Checking database…</div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <h2 id="page-title">Dashboard</h2>
        <div class="topbar-actions">
          <button id="btn-import-usac" class="btn btn-secondary" title="Import CA data from USAC (smart sync of recent years). Shift/Ctrl/Cmd-click for full reimport of all years.">Import CA Data</button>
          <button id="btn-new-app" class="btn btn-primary">+ New Application</button>
        </div>
      </header>

      <section id="view-dashboard" class="view active">
        <div id="import-status" class="import-status hidden"></div>
        <div id="last-sync" class="import-status" style="font-size:0.85em; margin-bottom:8px;"></div>
        <div class="stats-grid" id="stats-grid"></div>
        <div class="dashboard-grid">
          <div class="card">
            <h3>Applications by Status</h3>
            <div id="status-chart" class="bar-chart"></div>
          </div>
          <div class="card">
            <h3>Funding by Year</h3>
            <div id="year-chart" class="bar-chart"></div>
          </div>
          <div class="card card-wide">
            <h3>Recent Activity</h3>
            <div id="recent-activity" class="activity-list"></div>
          </div>
        </div>
      </section>

      <section id="view-applications" class="view">
        <div class="filters card">
          <input type="search" id="filter-search" placeholder="Search entity or app number (live USAC lookup)…">
          <select id="filter-year">
            <option value="">All funding years</option>
          </select>
          <select id="filter-status">
            <option value="">All statuses</option>
          </select>
          <button id="btn-apply-filters" class="btn btn-secondary">Search</button>
        </div>
        <div id="search-status" class="search-status hidden"></div>
        <div class="card table-card">
          <table class="data-table">
            <thead>
              <tr>
                <th>App #</th>
                <th>FY</th>
                <th>BEN</th>
                <th>Entity</th>
                <th>Status</th>
                <th>FRNs</th>
                <th>Requested</th>
                <th>Committed</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="applications-tbody"></tbody>
          </table>
        </div>
      </section>

      <section id="view-frns" class="view">
        <div class="card table-card">
          <table class="data-table">
            <thead>
              <tr>
                <th>FRN</th>
                <th>App #</th>
                <th>FY</th>
                <th>Entity</th>
                <th>Cat</th>
                <th>Service</th>
                <th>Status</th>
                <th>Requested</th>
                <th>Committed</th>
              </tr>
            </thead>
            <tbody id="frns-tbody"></tbody>
          </table>
        </div>
      </section>

      <section id="view-detail" class="view">
        <button id="btn-back" class="btn btn-ghost">← Back</button>
        <div id="detail-content"></div>
      </section>
    </main>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-panel">
      <div class="modal-header">
        <h3 id="modal-title">New Application</h3>
        <button class="modal-close" aria-label="Close">&times;</button>
      </div>
      <form id="modal-form" class="modal-form"></form>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost modal-cancel">Cancel</button>
        <button type="submit" form="modal-form" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
